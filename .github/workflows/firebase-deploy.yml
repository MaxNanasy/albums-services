name: Firebase Deploy

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  deploy-test:
    name: Deploy to albums-test-a0356
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Authenticate to Google Cloud (test)
        env:
          FIREBASE_SERVICE_ACCOUNT_TEST: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEST }}
        run: |
          cat <<'EOF' > "$RUNNER_TEMP/gcp-test-service-account.json"
          $FIREBASE_SERVICE_ACCOUNT_TEST
          EOF
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-test-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy to test Firebase project
        run: firebase deploy --non-interactive --project albums-test-a0356

  deploy-main:
    name: Deploy to albums-a9952
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Authenticate to Google Cloud (prod)
        env:
          FIREBASE_SERVICE_ACCOUNT_PROD: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
        run: |
          cat <<'EOF' > "$RUNNER_TEMP/gcp-prod-service-account.json"
          $FIREBASE_SERVICE_ACCOUNT_PROD
          EOF
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-prod-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy to main Firebase project
        run: firebase deploy --non-interactive --project albums-a9952
