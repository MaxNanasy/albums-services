name: Firebase Deploy

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  deploy-test:
    name: Deploy to Albums - Test project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Install runtime dependencies
        run: npm ci --production
        working-directory: functions

      - name: Set up Google Cloud authentication
        env:
          FIREBASE_SERVICE_ACCOUNT_TEST: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEST }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_TEST" > "$RUNNER_TEMP/gcp-test-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-test-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy to Albums - Test project
        run: firebase deploy --non-interactive --project albums-test-a0356

  deploy-prod:
    name: Deploy to Albums project
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Install runtime dependencies
        run: npm ci --production
        working-directory: functions

      - name: Set up Google Cloud authentication
        env:
          FIREBASE_SERVICE_ACCOUNT_PROD: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_PROD" > "$RUNNER_TEMP/gcp-prod-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-prod-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy to Albums project
        run: firebase deploy --non-interactive --project albums-a9952
