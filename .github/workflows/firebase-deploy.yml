name: Firebase Deploy

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  deploy-test:
    name: Deploy to albums-test-a0356
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Deploy to test Firebase project
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --non-interactive --project albums-test-a0356

  deploy-main:
    name: Deploy to albums-a9952
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Deploy to main Firebase project
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --non-interactive --project albums-a9952
